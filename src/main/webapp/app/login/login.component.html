<section id="contact" class="mt-5">
  <div class="container-lg">
    <!-- Heading -->
    <div class="text-end mb-4">
      <h2 data-cy="loginTitle" jhiTranslate="login.title">DTN Paper Products</h2>

      <p class="lead" jhiTranslate="login.subtitle">Admin Panel Login</p>
    </div>

    <!-- Error Message -->
    @if (authenticationError()) {
      <div class="alert alert-danger" data-cy="loginError" jhiTranslate="login.messages.error.authentication">
        <strong>Failed to sign in!</strong>
        Please check your credentials and try again.
      </div>
    }

    <!-- Login Form -->
    <div class="row justify-content-end">
      <div class="col-md-6 col-lg-5">
        <form name="loginForm" (ngSubmit)="login()" [formGroup]="loginForm" novalidate>
          <!-- Username -->
          <div class="mb-3">
            <label class="form-label" for="username" jhiTranslate="global.form.username.label"> Username or Email </label>

            <input
              #username
              type="text"
              class="form-control"
              name="username"
              id="username"
              formControlName="username"
              data-cy="username"
              placeholder="{{ 'global.form.username.placeholder' | translate }}"
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label" for="password" jhiTranslate="login.form.password"> Password </label>

            <input
              type="password"
              class="form-control"
              name="password"
              id="password"
              formControlName="password"
              data-cy="password"
              placeholder="{{ 'login.form.password.placeholder' | translate }}"
            />
          </div>

          <!-- Remember Me -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />

            <label class="form-check-label" for="rememberMe" jhiTranslate="login.form.rememberme"> Remember me </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-100" data-cy="submit" jhiTranslate="login.form.button">Sign in</button>
        </form>

        <!-- Forgot Password -->
        <div class="mt-4 alert alert-warning">
          <a
            class="alert-link"
            routerLink="/account/reset/request"
            data-cy="forgetYourPasswordSelector"
            jhiTranslate="login.password.forgot"
          >
            Did you forget your password?
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
